name: "Reproduce: GitHub API %2F encoding bug"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  contents-api:
    name: "Contents API: %2F in file paths"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Setup: create .github/test-file via unencoded path"
        uses: actions/github-script@v7
        with:
          script: |
            await github.request('PUT /repos/{owner}/{repo}/contents/{+path}', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/test-file',
              message: 'test: create file for encoding PoC',
              content: Buffer.from('hello from the encoding bug PoC\n').toString('base64')
            });
            console.log('Created .github/test-file via {+path} (slashes preserved)');

      - name: "Test 1: READ .github/test-file via repos.getContent (encodes / as %2F)"
        uses: actions/github-script@v7
        with:
          script: |
            console.log('github.rest.repos.getContent({ path: ".github/test-file" })');
            console.log('Sends: GET /repos/.../contents/.github%2Ftest-file');
            console.log('');
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/test-file'
              });
              console.log(`RESULT: Found file at ${data.path}`);
              console.log('VERDICT: Server decoded %2F -> old behavior still works');
            } catch (e) {
              console.log(`RESULT: ${e.status} Not Found`);
              console.log('VERDICT: Server treated %2F literally -> BUG');
            }

      - name: "Test 2: READ .github/test-file via request({+path}) (preserves /)"
        uses: actions/github-script@v7
        with:
          script: |
            console.log('github.request("GET .../contents/{+path}", { path: ".github/test-file" })');
            console.log('Sends: GET /repos/.../contents/.github/test-file');
            console.log('');
            try {
              const { data } = await github.request('GET /repos/{owner}/{repo}/contents/{+path}', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/test-file'
              });
              console.log(`RESULT: Found file at ${data.path}`);
              console.log('VERDICT: {+path} workaround works');
            } catch (e) {
              console.log(`RESULT: ${e.status} ${e.message}`);
            }

      - name: "Test 3: CREATE .github/poc-file via createOrUpdateFileContents (encodes / as %2F)"
        uses: actions/github-script@v7
        with:
          script: |
            console.log('github.rest.repos.createOrUpdateFileContents({ path: ".github/poc-file" })');
            console.log('Sends: PUT /repos/.../contents/.github%2Fpoc-file');
            console.log('');
            try {
              const { data } = await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/poc-file',
                message: 'test: create via {path} expansion',
                content: Buffer.from('created via {path} expansion\n').toString('base64')
              });
              const p = data.content.path;
              console.log(`RESULT: File created at: ${p}`);
              if (p.includes('%2F')) {
                console.log('VERDICT: BUG - file created with literal %2F in name');
              } else {
                console.log('VERDICT: Server decoded %2F -> old behavior still works');
              }
            } catch (e) {
              console.log(`RESULT: ${e.status} ${e.message}`);
            }

      - name: "Cleanup"
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            for (const path of ['.github/test-file', '.github/poc-file', '.github%2Fpoc-file']) {
              try {
                const { data } = await github.request('GET /repos/{owner}/{repo}/contents/{+path}', {
                  owner: context.repo.owner, repo: context.repo.repo, path
                });
                await github.request('DELETE /repos/{owner}/{repo}/contents/{+path}', {
                  owner: context.repo.owner, repo: context.repo.repo, path,
                  message: `cleanup: remove ${path}`, sha: data.sha
                });
                console.log(`Deleted: ${path}`);
              } catch { /* ignore */ }
            }

  environments-api:
    name: "Environments API: %2F in environment names"
    runs-on: ubuntu-latest
    steps:
      - name: "Setup: create environment 'test / slash' via Octokit request (preserves /)"
        uses: actions/github-script@v7
        with:
          script: |
            // Use Octokit request to create environment - slash preserved in URL
            const envName = 'test / slash';
            console.log(`Creating environment: "${envName}"`);
            console.log('URL: PUT /repos/.../environments/test%20/%20slash (slash preserved)');
            console.log('');
            try {
              const { data } = await github.request('PUT /repos/{owner}/{repo}/environments/{environment_name}', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment_name: envName
              });
              console.log(`Created environment: "${data.name}"`);
            } catch (e) {
              console.log(`Failed: ${e.status} ${e.message}`);
              console.log('Note: GITHUB_TOKEN may not have environments permission on this repo.');
              console.log('If 404, try enabling environments in repo settings first.');
            }

      - name: "Test 1: READ 'test / slash' via %2F-encoded request"
        uses: actions/github-script@v7
        with:
          script: |
            // Manually construct URL with %2F (simulating what a percent-encoding client does)
            const encoded = 'test%20%2F%20slash';
            console.log(`Reading via manually encoded path: /environments/${encoded}`);
            console.log('');
            try {
              // Use request with {+path} so we control the exact encoding
              const { data } = await github.request('GET /repos/{owner}/{repo}/environments/{+env}', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                env: encoded
              });
              console.log(`RESULT: Found environment "${data.name}"`);
              if (data.name === 'test / slash') {
                console.log('VERDICT: Server decoded %2F back to / -> old behavior');
              } else {
                console.log(`VERDICT: Server returned "${data.name}" which may have literal %2F`);
              }
            } catch (e) {
              console.log(`RESULT: ${e.status} Not Found`);
              console.log('VERDICT: Server treated %2F literally -> BUG');
            }

      - name: "Test 2: CREATE 'test / slash' via %2F-encoded PUT (duplicate test)"
        uses: actions/github-script@v7
        with:
          script: |
            const encoded = 'test%20%2F%20slash';
            console.log(`Creating via encoded path: PUT /environments/${encoded}`);
            console.log('If %2F is treated literally, this creates a DUPLICATE environment');
            console.log('');
            try {
              const { data } = await github.request('PUT /repos/{owner}/{repo}/environments/{+env}', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                env: encoded
              });
              console.log(`Created/updated: "${data.name}"`);
              if (data.name.includes('%2F')) {
                console.log('VERDICT: BUG - environment created with literal %2F in name');
              } else {
                console.log('VERDICT: Server decoded %2F -> no duplicate');
              }
            } catch (e) {
              console.log(`Failed: ${e.status} ${e.message}`);
            }

      - name: "Test 3: List all environments (check for duplicates)"
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.request('GET /repos/{owner}/{repo}/environments', {
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const envs = data.environments || [];
            console.log(`Total environments: ${envs.length}`);
            for (const env of envs) {
              console.log(`  - "${env.name}"`);
            }
            console.log('');
            if (envs.length > 1) {
              console.log('VERDICT: BUG - duplicate environments created via %2F encoding');
            } else if (envs.length === 1) {
              console.log('VERDICT: No duplicates - server handled encoding correctly');
            } else {
              console.log('VERDICT: No environments found (setup may have failed)');
            }

      - name: "Cleanup"
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            // Try deleting both possible variants
            for (const env of ['test%20/%20slash', 'test%20%2F%20slash']) {
              try {
                await github.request('DELETE /repos/{owner}/{repo}/environments/{+env}', {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  env: env
                });
                console.log(`Deleted via: ${env}`);
              } catch { /* ignore */ }
            }

  gh-cli-api:
    name: "gh CLI: %2F in API paths"
    runs-on: ubuntu-latest
    steps:
      - name: "Setup: create .github/test-gh-cli via unencoded path"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          content=$(echo "test content" | base64)
          gh api -X PUT "repos/${{ github.repository }}/contents/.github/test-gh-cli" \
            -f message="test: create via gh api (unencoded)" \
            -f content="$content" \
            --jq '.content.path'

      - name: "Test 1: READ via gh api with %2F-encoded path"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "gh api repos/.../contents/.github%2Ftest-gh-cli"
          echo ""
          if path=$(gh api "repos/${{ github.repository }}/contents/.github%2Ftest-gh-cli" \
            --jq '.path' 2>&1); then
            echo "RESULT: Found at $path"
            echo "VERDICT: Server decoded %2F -> old behavior"
          else
            echo "RESULT: 404 Not Found"
            echo "VERDICT: Server treated %2F literally -> BUG"
          fi

      - name: "Test 2: READ via gh api with unencoded path"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "gh api repos/.../contents/.github/test-gh-cli"
          echo ""
          if path=$(gh api "repos/${{ github.repository }}/contents/.github/test-gh-cli" \
            --jq '.path' 2>&1); then
            echo "RESULT: Found at $path"
            echo "VERDICT: Unencoded slash works"
          else
            echo "RESULT: Not Found"
          fi

      - name: "Cleanup"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for path in ".github/test-gh-cli" ".github%2Ftest-gh-cli"; do
            sha=$(gh api "repos/${{ github.repository }}/contents/$path" --jq '.sha' 2>/dev/null) || continue
            gh api -X DELETE "repos/${{ github.repository }}/contents/$path" \
              -f message="cleanup" -f sha="$sha" 2>/dev/null && echo "Deleted: $path" || true
          done

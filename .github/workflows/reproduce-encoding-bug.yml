name: "Reproduce: GitHub API %2F encoding bug"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  contents-api:
    name: "Contents API: %2F in file paths"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Setup: create .github/test-file via unencoded path"
        uses: actions/github-script@v7
        with:
          script: |
            // Create a file at .github/test-file using {+path} (reserved expansion, preserves /)
            await github.request('PUT /repos/{owner}/{repo}/contents/{+path}', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/test-file',
              message: 'test: create file for encoding PoC',
              content: Buffer.from('hello from the encoding bug PoC\n').toString('base64')
            });
            console.log('Created .github/test-file via {+path} (slashes preserved)');

      - name: "Test 1: READ via octokit.rest.repos.getContent (uses {path} = encodes / as %2F)"
        uses: actions/github-script@v7
        with:
          script: |
            // octokit.rest.repos.getContent uses RFC 6570 simple expansion {path}
            // which encodes / as %2F via encodeURIComponent
            console.log('Calling: github.rest.repos.getContent({ path: ".github/test-file" })');
            console.log('This sends: GET /repos/owner/repo/contents/.github%2Ftest-file');
            console.log('');
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/test-file'
              });
              console.log(`PASS: Found file at: ${data.path}`);
              console.log('Server decoded %2F back to / (old behavior)');
            } catch (e) {
              console.log(`FAIL: ${e.status} ${e.message}`);
              console.log('Server did NOT decode %2F - treated it as literal characters (new behavior)');
              console.log('');
              console.log('This is the bug. The Octokit REST client correctly percent-encodes');
              console.log('the slash per RFC 3986, but the server no longer decodes it.');
            }

      - name: "Test 2: READ via github.request with {+path} (preserves /)"
        uses: actions/github-script@v7
        with:
          script: |
            // github.request with {+path} uses RFC 6570 reserved expansion
            // which preserves / as literal slash
            console.log('Calling: github.request("GET /repos/{owner}/{repo}/contents/{+path}", ...)');
            console.log('This sends: GET /repos/owner/repo/contents/.github/test-file');
            console.log('');
            try {
              const { data } = await github.request('GET /repos/{owner}/{repo}/contents/{+path}', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/test-file'
              });
              console.log(`PASS: Found file at: ${data.path}`);
              console.log('Workaround works: {+path} sends literal / which the server handles correctly.');
            } catch (e) {
              console.log(`FAIL: ${e.status} ${e.message}`);
            }

      - name: "Test 3: CREATE via octokit.rest (uses {path} = encodes / as %2F)"
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Calling: github.rest.repos.createOrUpdateFileContents({ path: ".github/poc-file" })');
            console.log('This sends: PUT /repos/owner/repo/contents/.github%2Fpoc-file');
            console.log('');
            try {
              const { data } = await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/poc-file',
                message: 'test: create via {path} expansion (encodes slash)',
                content: Buffer.from('created via {path} expansion\n').toString('base64')
              });
              const createdPath = data.content.path;
              console.log(`File created at: ${createdPath}`);
              if (createdPath.includes('%2F')) {
                console.log('');
                console.log('BUG CONFIRMED: File was created with literal %2F in the name!');
                console.log(`Expected: .github/poc-file`);
                console.log(`Got:      ${createdPath}`);
              } else {
                console.log('Server decoded %2F back to / (old behavior)');
              }
            } catch (e) {
              console.log(`Error: ${e.status} ${e.message}`);
            }

      - name: "Cleanup: remove test files"
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            for (const path of ['.github/test-file', '.github/poc-file', '.github%2Fpoc-file']) {
              try {
                const { data } = await github.request('GET /repos/{owner}/{repo}/contents/{+path}', {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: path
                });
                await github.request('DELETE /repos/{owner}/{repo}/contents/{+path}', {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: path,
                  message: `cleanup: remove ${path}`,
                  sha: data.sha
                });
                console.log(`Deleted: ${path}`);
              } catch {
                // ignore
              }
            }

  environments-api:
    name: "Environments API: %2F in environment names"
    runs-on: ubuntu-latest
    steps:
      - name: "Setup: create environment with / in name"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create an environment with / in its name using unencoded slash
          # (spaces encoded, slash preserved)
          echo '{}' | gh api -X PUT \
            "repos/${{ github.repository }}/environments/test%20/%20slash-encoding" \
            --input - --jq '.name'
          echo "Created environment via unencoded slash path"

      - name: "Test 1: READ via %2F-encoded path"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Calling: GET repos/.../environments/test%20%2F%20slash-encoding"
          echo "This encodes / as %2F (correct per RFC 3986)"
          echo ""
          if name=$(gh api "repos/${{ github.repository }}/environments/test%20%2F%20slash-encoding" \
            --jq '.name' 2>&1); then
            echo "PASS: Found environment: $name"
            echo "Server decoded %2F back to / (old behavior)"
          else
            echo "FAIL: 404 - environment not found"
            echo "Server did NOT decode %2F (new behavior)"
            echo ""
            echo "The environment exists with / in its name, but looking it up"
            echo "with %2F-encoded slash fails because the server treats %2F literally."
          fi

      - name: "Test 2: READ via unencoded slash path (workaround)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Calling: GET repos/.../environments/test%20/%20slash-encoding"
          echo "This preserves / as literal slash"
          echo ""
          if name=$(gh api "repos/${{ github.repository }}/environments/test%20/%20slash-encoding" \
            --jq '.name' 2>&1); then
            echo "PASS: Found environment: $name"
            echo "Workaround works: literal / in path is handled correctly."
          else
            echo "FAIL: $name"
          fi

      - name: "Test 3: CREATE via %2F-encoded path (shows duplicate bug)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Calling: PUT repos/.../environments/test%20%2F%20slash-encoding"
          echo ""
          name=$(echo '{}' | gh api -X PUT \
            "repos/${{ github.repository }}/environments/test%20%2F%20slash-encoding" \
            --input - --jq '.name' 2>&1) || true
          echo "Created/updated environment: $name"
          echo ""
          if echo "$name" | grep -q '%2F'; then
            echo "BUG CONFIRMED: Environment created with literal %2F in the name!"
            echo "Expected: test / slash-encoding"
            echo "Got:      $name"
          fi

      - name: "Test 4: List all environments (shows duplicates)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "All environments on this repo:"
          gh api "repos/${{ github.repository }}/environments" \
            --jq '.environments[].name' 2>&1 | while read -r name; do
            echo "  - $name"
          done
          echo ""
          count=$(gh api "repos/${{ github.repository }}/environments" \
            --jq '.environments | length')
          if [[ "$count" -gt 1 ]]; then
            echo "BUG: $count environments exist. The %2F-encoded PUT created a duplicate"
            echo "instead of matching the existing environment."
          fi

      - name: "Cleanup: remove test environments"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete both possible variants
          for enc in "test%20/%20slash-encoding" "test%20%2F%20slash-encoding"; do
            gh api -X DELETE "repos/${{ github.repository }}/environments/$enc" 2>/dev/null \
              && echo "Deleted environment via: $enc" || true
          done

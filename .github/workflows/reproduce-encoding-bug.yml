name: "Reproduce: GitHub API %2F encoding bug"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  octokit-contents:
    name: "Octokit: %2F in contents API paths"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Setup: create .github/test-file via {+path} (baseline)"
        uses: actions/github-script@v7
        with:
          script: |
            // {+path} = RFC 6570 reserved expansion, preserves / as literal slash
            await github.request('PUT /repos/{owner}/{repo}/contents/{+path}', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/test-file',
              message: 'test: create file for encoding PoC',
              content: Buffer.from('hello from the encoding bug PoC\n').toString('base64')
            });
            console.log('Created .github/test-file via {+path} (slashes preserved in URL)');

      - name: "Test 1: READ .github/test-file via repos.getContent() — uses {path}, encodes / as %2F"
        uses: actions/github-script@v7
        with:
          script: |
            // repos.getContent() uses RFC 6570 simple expansion {path}
            // which encodes / as %2F via encodeURIComponent
            //
            // The HTTP request sent is:
            //   GET /repos/emilva/github-encoding-bug/contents/.github%2Ftest-file
            //
            // Before ~April 8-9 2026: server decoded %2F -> found .github/test-file
            // After:                   server treats %2F literally -> 404

            console.log('github.rest.repos.getContent({ path: ".github/test-file" })');
            console.log('HTTP: GET /repos/.../contents/.github%2Ftest-file');
            console.log('');
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/test-file'
              });
              console.log(`RESULT: Found file at ${data.path}`);
              console.log('VERDICT: %2F decoded by server (old behavior, not broken)');
            } catch (e) {
              console.log(`RESULT: ${e.status} Not Found`);
              console.log('VERDICT: %2F treated literally by server — BUG CONFIRMED');
              console.log('');
              console.log('The Octokit REST client correctly percent-encodes / as %2F');
              console.log('per RFC 3986, but the server no longer decodes it back to /.');
              console.log('This breaks repos.getContent() for any path with / (e.g. .github/CODEOWNERS).');
            }

      - name: "Test 2: READ .github/test-file via request({+path}) — workaround, preserves /"
        uses: actions/github-script@v7
        with:
          script: |
            // github.request with {+path} uses RFC 6570 reserved expansion
            // which preserves / as literal slash in the URL
            //
            // HTTP request: GET /repos/.../contents/.github/test-file
            // This always works because / is never encoded.

            console.log('github.request("GET .../contents/{+path}", { path: ".github/test-file" })');
            console.log('HTTP: GET /repos/.../contents/.github/test-file');
            console.log('');
            try {
              const { data } = await github.request('GET /repos/{owner}/{repo}/contents/{+path}', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/test-file'
              });
              console.log(`RESULT: Found file at ${data.path}`);
              console.log('VERDICT: {+path} workaround works');
            } catch (e) {
              console.log(`RESULT: ${e.status} ${e.message}`);
            }

      - name: "Test 3: CREATE .github/poc-file via createOrUpdateFileContents() — uses {path}, encodes / as %2F"
        uses: actions/github-script@v7
        with:
          script: |
            // createOrUpdateFileContents() uses RFC 6570 simple expansion {path}
            // which encodes / as %2F
            //
            // HTTP request: PUT /repos/.../contents/.github%2Fpoc-file
            //
            // Before: server decoded %2F -> created file at .github/poc-file
            // After:  server treats %2F literally -> creates a ROOT-LEVEL file
            //         named ".github%2Fpoc-file" (literal percent-two-F in name)

            console.log('github.rest.repos.createOrUpdateFileContents({ path: ".github/poc-file" })');
            console.log('HTTP: PUT /repos/.../contents/.github%2Fpoc-file');
            console.log('');
            try {
              const { data } = await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/poc-file',
                message: 'test: create via {path} expansion',
                content: Buffer.from('created via {path} expansion\n').toString('base64')
              });
              const p = data.content.path;
              console.log(`RESULT: File created at: ${p}`);
              if (p.includes('%2F')) {
                console.log('VERDICT: BUG CONFIRMED — file created with literal %2F in name');
                console.log(`  Expected path: .github/poc-file`);
                console.log(`  Actual path:   ${p}`);
                console.log('');
                console.log('This is how .github/CODEOWNERS becomes .github%2FCODEOWNERS');
              } else {
                console.log('VERDICT: %2F decoded by server (old behavior, not broken)');
              }
            } catch (e) {
              console.log(`RESULT: ${e.status} ${e.message}`);
            }

      - name: "Cleanup"
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            for (const path of ['.github/test-file', '.github/poc-file', '.github%2Fpoc-file']) {
              try {
                const { data } = await github.request('GET /repos/{owner}/{repo}/contents/{+path}', {
                  owner: context.repo.owner, repo: context.repo.repo, path
                });
                await github.request('DELETE /repos/{owner}/{repo}/contents/{+path}', {
                  owner: context.repo.owner, repo: context.repo.repo, path,
                  message: `cleanup: remove ${path}`, sha: data.sha
                });
                console.log(`Deleted: ${path}`);
              } catch { /* ignore */ }
            }

  gh-cli-contents:
    name: "gh CLI: %2F in contents API paths"
    needs: octokit-contents
    runs-on: ubuntu-latest
    steps:
      - name: "Setup: create .github/test-gh-cli via unencoded path"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          content=$(echo "test content" | base64)
          gh api -X PUT "repos/${{ github.repository }}/contents/.github/test-gh-cli" \
            -f message="test: create via gh api (unencoded slash)" \
            -f content="$content" \
            --jq '.content.path'

      - name: "Test 1: READ .github/test-gh-cli via %2F-encoded path"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # gh api passes the URL path as-is to the HTTP client.
          # If we manually encode / as %2F in the path, the server
          # should decode it back to / — but does it?

          echo "gh api repos/.../contents/.github%2Ftest-gh-cli"
          echo ""
          if path=$(gh api "repos/${{ github.repository }}/contents/.github%2Ftest-gh-cli" \
            --jq '.path' 2>&1); then
            echo "RESULT: Found at $path"
            echo "VERDICT: %2F decoded by server (old behavior)"
          else
            echo "RESULT: 404 Not Found"
            echo "VERDICT: %2F treated literally by server — BUG CONFIRMED"
          fi

      - name: "Test 2: READ .github/test-gh-cli via unencoded path (control)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "gh api repos/.../contents/.github/test-gh-cli"
          echo ""
          if path=$(gh api "repos/${{ github.repository }}/contents/.github/test-gh-cli" \
            --jq '.path' 2>&1); then
            echo "RESULT: Found at $path"
            echo "VERDICT: Unencoded slash works (as expected)"
          else
            echo "RESULT: Not Found (unexpected)"
          fi

      - name: "Test 3: CREATE .github/poc-gh-cli via %2F-encoded path"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # This tests whether creating a file via %2F-encoded path
          # creates it at the correct location or with %2F in the name

          echo "gh api -X PUT repos/.../contents/.github%2Fpoc-gh-cli"
          echo ""
          content=$(echo "test" | base64)
          path=$(gh api -X PUT "repos/${{ github.repository }}/contents/.github%2Fpoc-gh-cli" \
            -f message="test: create via %2F-encoded path" \
            -f content="$content" \
            --jq '.content.path' 2>&1) || true
          echo "RESULT: File created at: $path"
          if echo "$path" | grep -q '%2F'; then
            echo "VERDICT: BUG CONFIRMED — file created with literal %2F in name"
          else
            echo "VERDICT: %2F decoded by server (old behavior)"
          fi

      - name: "Cleanup"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for path in ".github/test-gh-cli" ".github/poc-gh-cli" ".github%2Fpoc-gh-cli"; do
            sha=$(gh api "repos/${{ github.repository }}/contents/$path" --jq '.sha' 2>/dev/null) || continue
            gh api -X DELETE "repos/${{ github.repository }}/contents/$path" \
              -f message="cleanup" -f sha="$sha" 2>/dev/null && echo "Deleted: $path" || true
          done
